services:
  - type: web
    name: estoque-app
    env: python
    pythonVersion: 3.11.8
    buildCommand: "bash build.sh"
    startCommand: "gunicorn estoque_project.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: postgres
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"

databases:
  - name: postgres
    databaseName: estoque_db
    user: estoque_user
